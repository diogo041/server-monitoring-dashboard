server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: api-file-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: api
          service: api
          env: local
          __path__: /var/log/server-monitoring/api.log




          