services:
  api:
    build:
      context: ./services/api
    container_name: server-monitoring-api
    ports:
      - "4100:4100"
    volumes:
      - api-logs:/app/logs

  prometheus:
    image: prom/prometheus:latest
    container_name: server-monitoring-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - api

  grafana:
    image: grafana/grafana:latest
    container_name: server-monitoring-grafana
    ports:
      - "3100:3000"
    volumes:
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - loki

  loki:
    image: grafana/loki:latest
    container_name: server-monitoring-loki
    ports:
      - "3200:3100"
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/loki-config.yml:ro

  promtail:
    image: grafana/promtail:latest
    container_name: server-monitoring-promtail
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - api-logs:/var/log/server-monitoring:ro
    depends_on:
      - api
      - loki

volumes:
  api-logs:
  