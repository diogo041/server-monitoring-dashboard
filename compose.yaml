services:
  api:
    build:
      context: ./services/api
    container_name: server-monitoring-api
    ports:
      - "4100:4100"

  prometheus:
    image: prom/prometheus:latest
    container_name: server-monitoring-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - api
      